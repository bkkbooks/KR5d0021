  text: 周易參同契注卷上容七
  hash: sha256:15a9b6bbb02a548601c47fb80d0671f5c7b4af0dc5931f6e631f1401bdbc010d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0021_HFL_001-001a, image: hfl/0624/0624-028.png}
body:
  text: 無名氏注周者乃常道也易者變改之義言造大還丹運火皆用一周天故曰周易者汞為日南方離火屬巳太陽之精為青龍鉛為月北方坎水屬戊太陰之精為白虎亦為丹砂為日汞為月故日月為易字參者雜也雜其水土金三物也同為一家如符若契契其一體故曰參同契昔真人號曰龍虎上經龍者汞也汞是水銀之别名也虎者金公也亦丹砂赤色曰赤龍汞白色為白虎水銀為濕銀故稱曰虎後魏君改為參同契託在周易謂易者有剛柔表裏君臣父子水火五行其神丹不出陰陽五行所以託於周易也經者常也常經聖人傳授故曰經也所以凌陽子於崆峒山傳與徐從事徐從事傳與淳于君淳于君仰觀卦象以器象於天地配以乾坤以藥象於坎離配以水火則為日月以鼎象於大白亦為鎮星以爐為城郭餘六十卦以定升降消息陰陽度數二至加减翻轉鼎器所以便造篇名五相類類解前文集後一卷并前三卷以表三才鼎藥以象三光第一卷以論金汞成形日月升降第二卷論增减十月脫胎第三卷淳于君撰重解上下二卷疑于始傳魏君乾坤者易之門户乾坤謂鼎器也乾為上釜坤為下釜易者金汞象於日月以為藥物又運火訣云乾形西北借陽而居陰位坤形西南借陰而居陽位故乾借陰坤借陽乾借陰者謂乾五月一陰爻生坤借陽者謂坤十一月一陽爻生故乾發火而坤直至震來受符終乎十五日後即坤發火亦終十五日乾出坤入開閉鼎器故為門户二義俱通用也衆卦之父母謂乾坤為六十四卦之父母故大丹非鼎器不能養成說卦云乾為父坤為母乾天坤地宇宙之內莫非乾坤所養也萬物皆由天地陰陽而生長故曰父母坎離匡郭言伏汞為丹上安水下安火亦將鼎時蘸水令受水火之氣故歌云上水成湯流珠彼防是也亦謂藥物坎是金公離是朱汞以二寶為丹用水火匡郭上下釜也謂匡是輔郭為器故輔之二義通也運轂正軸牝牡轂器也故乾為陽牝為上蓋坤為陰牡為下鼎釜謂運火轉其鼎器如日月在乾坤之內輪轉又似車軸而轉也四卦為之橐籥四卦者乾坤象器坎離象藥橐是器籥是鼎四邊安紐關籥令牢密也故云橐喻器也籥喻關也老君曰橐韛也籥笛也喻笛空心以鼓口韛氣而吹之成宫商之語辭言鼎內空象如笛用韛火氣而運之如氣吹笛覆冒陰陽之道陰陽是金汞二藥冒喻在鼎內用金花等急按之覆藉上下冒者謂之牢固際故乾坎為陽坤離為陰故曰陰陽之道如籥運韛火氣乃成丹猶御者之執銜轡是守御鼎器恐有走失銜在口關須密閉在固際牢如轡在手以運之故不停者有準繩正規矩隨軌轍繩者界伴隨十二時轉如車軸轉也軌轍軸也準平常令軸逐平故隨軌轍而轉也處中以制外謂鼎在爐中得外火制之又藥在鼎中得外火水所制故云處中以制外也外須牢固際乃調水火以相伏制四義通也是故在曆紀紀月也若論上六十年為一紀為月言曆六十卦為一紀為旦暮運火常用一卦經曆十一月而成一轉丹月節有五六五六謂三十日成一月每月一開看覷淘研重入鼎中而成第一鼎大丹也經緯奉日使言運火依奉晨使是擇日經是秉持也緯五星言秉持皆依星宿故月受日化化生萬物所以擇元日埿竈火日殺汞成日合搗收日鍊治閉日入鼎建日祭爐王相日服藥十一月上元日發火者依遁甲假如冬至前後見甲子為上元又見甲巳之日故取夜半時發火也兼并六十四卦兼并是夜也謂一依遁甲計五十日有六十日行六十卦一時行一卦并前在乾坤坎離四卦成六十四卦是一日運火一月亦用六十四卦一日用二卦謂從屯蒙所起也一日用六十四時時者謂五日一易符以折論入小時計有六十時剛柔有表裏乾剛坤柔是陰陽之運動東為表是子終於巳西為裏是午終於亥又陽為表上蓋陰為裏下蓋又剛是外器柔是內藥言三義俱通朔旦屯直事言一日有一直事一直符也震是朔一日直符為坎在上震在下坎是藥汞震是鼎從子至午器仰是屯卦直事震是直符即是一日用事一月亦然後十一月坎卦用事坎有三爻上下二爻是陰中一爻是陽十一月陽爻於盛陰中生外制二陰爻令入陽爻令出至五月離卦用事離有三爻上下二爻是陽中一爻是陰一陰爻於盛陽中生陰制於陽屯陰出陽入故旦用屯者也至暮蒙當受暮用艮在上為直符坎在下蒙卦從午後至子轉器向下成蒙卦卦直事故云蒙受晝夜十二時六時艮蒙六時震屯故晝屯夜蒙所以用頤為鼎器上艮下震故山雷曰頤卦用坎為藥坎是水銀在震艮中也晝夜各一卦言一日十二時晝屯夜蒙各用二卦一月即用六十卦用之有次序言一日一月一年皆行用六十卦一月從屯次蒙二月從需次訟以次盡終乎既濟成丹故云次序前論晝屯夜蒙者即是反轉鼎器後論次序者即是依卦據爻用火數也既未至晦爽既是既濟未是未濟言既濟為水在火上謂汞屬坎本是陽而居陰位陰中有陽喻硃砂是太陽精居南屬離離陽中有陰故離屬陰是陰居陽位今變為汞在北方硃砂南方位變汞為硃令北歸南令復本位故為既濟未濟者火在水上本未伏位為水銀本是硃砂生屬離今為陰居北今未歸南未位本體故云未濟又謂運六十卦起屯蒙終既未二卦至月晦及月朔更循環爽明也其二卦乃是一陰一陽之道終則還復始言既未二卦一月訖至後月亦從屯起次蒙終既未二卦十二月皆然是十一月坤復卦起至月末後月朔亦從復卦終是月末始為月初一月訖更依前起是也日辰為期度一日行十二時取一周天三百六十五度足日之一日辰謂十二辰又用二卦卦有六爻一爻主一辰所以用屯蒙二卦爻足十二時動靜有早晚言動器皆據子午前後反復陽動為早陰靜為晚春夏亦為陽動秋冬亦為陰靜也春夏據內體言春夏為陽從冬至後十一月建子起首左行四月陽氣終為東方為內是也從子到辰巳言發火從子起左行終於辰巳為陽氣絶汞死也秋冬外當用言秋冬為陰從五月夏至後從午終亥陰氣滅陰生於午而終於亥故象在外西為外自午訖戌亥午起事訖戌亥陰道滅也汞欲伏也為亥子為水神坤黑色亥正位乾也汞此伏也經十二月俱終於乾位也陰陽交通初乾終坤自然之理也故大還丹成也賞罰應春秋昏明順寒暑春夏暑為陽為明則賞用武火秋冬寒為陰為昏則罰用文火昏謂夜明謂旦言一年及一月一日皆應春秋運火行器須順寒暑寒為文火暑為武火夏至後加炭用武火冬至後滅炭用文火故順寒暑爻辭有仁義隨時發喜怒言運火皆據卦依爻辭隨卦之爻用火火有仁有義仁為文火喜義為武火怒又春夏為仁文火喜秋冬為義武火怒此是用文武火故得其理則喜失其辭則怒如君得臣萬姓喜風雨調得逆諂之臣則君常有怒宇宙不安丹道亦然用文武之火須順其理如是四時之氣序氣者火也言今用四時火氣使用則四序氣足順五行得其理順五行氣火則得其理夫合大丹大藥伏制成敗在火火若均調文武得所藥則無火火若不順藥雖精華即有飛散故謂心勤務在火也如國安萬姓歡立國不安即萬物憂遁者也天地設位而易行乎其中矣乾天也坤地也是鼎器也設位是陰陽配合也易者是日月是藥藥在鼎中居乾坤之內坎為月是鉛離為日是汞上日下月配而為易字喻於日月在其鼎中故曰易行其中天地者乾坤也乾為天上鼎蓋坤為地下鼎蓋設位者列陰陽配合之位也言鼎脣作雄雌相合陰陽是雌雄配合也設位者是爐上列諸方位星辰度數運乾坤定陰陽也易謂坎離坎離者乾坤二用言大丹同日月之精故日月為易坎月是金離日是汞故用坎離為藥乾坤為鼎故此四卦不同六十卦而自一用也亦云須水火上下攻之運乾坤之鼎故二用也汞居鼎內事須水火而伏制成大丹二用無爻位言坎離為藥乾坤為鼎其爻用位不同六十卦而無爻位周流行六虛言坎離二藥在乾坤鼎中常被水火攻迫運轉飛伏東西南北上下故云六虛六虛者六位也往來既不定上下亦無常言汞及反覆其鼎一日十二時六時向上六時向下無常定言從子至午已下言從午至亥上陽往則陰來陰往則陽來反覆不定故曰上下無常定言汞幽潜鼎內上被水火攻下被文武火迫乃無常定而成大還丹也幽潜淪匿言金公潜匿於汞中汞得金公而淪沒二物相伏隱於鼎中故幽伏淪沒也斗化於中斗者言爐上著稱衡如象天北斗斗柄逐月建而轉一日亦柄指一時一月亦然假如上月末間開即斗柄指子後月指丑起次順之其取時須定漏刻又鼎運火亦然言鼎象北斗而能運化包囊萬物為道綱紀包言金花等能包於汞如子遇母龍虎相吞故稱為道又用土金花等為泥包囊金汞內於鼎中囊者盛萬物也言其丹成後號曰紫金砂大還神丹點化萬物枯骨重榮土石為寶人服成真故為道之綱紀也以無制有氣用者空夫陽者是無陰者是有有是坎金無是離汞此乃坎離水火之位也空道也道者是空虛無之稱也化而生萬物無者謂陽形人無見之是為沖和氣有者是陰凝滯不通名曰沖和二氣相感風雨乃成故汞是陽而反歸金金者正陽丹也又其汞金是陰以陽得陰是名以無制有氣者火亦屬陽其金汞得火而制伏火即空無藥而成有故曰氣用者空故推消息消息者論陰陽升降消時减炭息時加炭升時器向上降時器向下坎離沒亡坎為金離為汞汞得金華相配故沒亡也言不苟造論不虛生言留法傳文不苟謬而言皆據陰陽爻象金汞相親同類而生故不立虛論真說也引驗見效授度神明言據爻象運火每月驗者皆有變有通於神明乃相教示度者法也取其法則而成大還丹推類結字原理為證言大還丹皆推陰陽以取坎離之象結為易字而取同類者金類汞以為丹非類無證驗坎戊月精離巳日光日月為易言鉛精象月為坎屬戊汞光象日為離屬巳故引日月之精光配而為易字且陰陽二寶者至九月十月十一月是坎戊之位陰之極也陰之精上升為月屬金為水故經中言金是九鍊鉛精金花也非是用真金精也經云乍用道中寶不用世中金大丹若有金銀雜即不可服餌但汞一味向成金丹即是神藥雖云用九轉銀精鉛乃成灰矣借銀之氣以陰助陽也陽至三月四月五月是離己之位陽之成也陽之精上升為日屬汞為火故日月為易丹若得金汞合之自然精光變化剛柔相合坎陽汞為剛離陰鉛為柔故陰陽相合而成大丹土王四季土者華也亦是鼎也又曰四黃屬土而王四季此非黃土為鼎若是用金鐵鼎即用黃土塗鼎內土然生金乃用也亦金華黃牙乃稱土也羅絡始終始是月朔終是月晦羅絡是器也又用黃土塗鼎內上又塗金花黃牙等用黃土鎮之青赤白黑各居一方青是東方木青龍汞也赤是南方火硃砂也白是西方白虎金精也黑是北方水鉛也所以金汞各配居四方又屬戊巳而居中宫並由中宫所禀戊巳之功言金汞二名而屬四方並屬中宫戊巳屬土之所成若正陽及獨化之藥不要雄曾唯任汞金相配日久火養自化成丹事須塗黃土及鎮土塗藥金花黃牙可厚半寸金花者是真鉛鉛入汞所成黃牙者是燒黃丹所作成為坎鉛屬戊離汞屬巳正稱戊巳故禀戊巳屬土之功化汞為丹也或人云丹硫黃化汞為硃號硫黃為上應非易者象也懸象著明莫大乎日月故日為硃汞月屬鉛銀七十二石之中莫過於鉛汞故得稱日月之號所以日月為易字託於周易也故夫子曰懸象著明莫大乎日月也懸象著明至妙莫大乎易故以易象於金汞窮神以知化陽往則陰來窮神火也火化萬物陽往是坤十一月一陽爻生終坤至乾乾則往陰來是五月一陰爻生也故陽往則乾消陰來則坤息來者伸往者屈皆是加减變卦運火也輻輳而輪轉言運火轉器如車輪轉也輻者謂三十輻共一轂三十者一月也轂器也所以一月輪轉鼎器也出入更卷舒陽出陰入言出震成乾入巽成坤消即為卷息即為舒運火用丹成卦也又法專法每月開鼎倍添生汞令汞撥入鼎計從一兩起至一周年若九轉添撥法後一年一火紅赤色至伏火即鎔成鋌黑色打碎重研入鼎又火一月至紫色即休又有正陽法以凡鉛汞等分從冬至起首夏至加火漸武至來年冬至停每一月一開看知存亡至一周其汞獨出鉛上紫色名曰陽元正陽之丹取此正陽又重入淨金花器又經一月紫色即了又法一月一開出虎入龍增龍减虎法龍是汞虎是鉛花更著雄黃而重入鼎為丹是三法此契論正陽之法卦有三百八十四爻爻據謫符符謂六十四卦也其六十四卦有三百八十四爻象一斤藥有三百八十四銖計一日行一周天小火氣足又計一周年其藥受大火氣足藥已成也象自然還丹受大陽之氣生焉符者言每日及月皆用二卦一卦直事一卦直符又符者五符金花等也正云天地之符金汞是也謫者度也是易之為丹用一周年成也體運火取周天度數數足而為丹其丹有二義此參同說者是半斤汞半斤花合為丹用一周年成若白雪九轉三年成專陽丹上可百斤下可一斤二斤十五月成也晦至朔旦震來受符言月晦終坤月朔變坤一爻為震震為直符復為直事當此一日十二辰轉也從子至巳陽道已終陰道巳起壬午發火也又一卦當直終亥每朔旦初一日即震動如符如印所使必定也當斯之際接也孔子曰天地洽合是用火之鼎密固其際天地媾其精日月相撢持天地者鼎也精者藥精華也日月金汞也撢探也扶持也言二寶在器當天地鼎器之間運太陽之火而化使日月之二藥交媾精氣相探扶持成丹如天氣下降地氣上騰日月相交陰陽媾會即有祥變而應丹道象此謂震來受符應命之時剛柔交媾金汞俱吐精華繫日月天地媾精萬物化生丹道亦然皆禀陰陽而生雄陽播玄施雄陽是汞玄是鉛鉛精謂九鉛之精得火即成水而入其汞鉛精即施而受其汞汞得鉛而布散入於鉛中待冷凝搗碎入於鼎中後運火成大還丹雌陰化黃包雌陰金公也其金公得汞猛火食頃而吐金華號曰玄黃之花將此花煬包汞入鼎得火之後唬唬作聲重沓狀似魚鱗金花而相拒聲若定汞即伏火紫色即丹成未紫更重燒故下文云唬唬如嬰兒慕母漏刻未過半魚鱗狎獵起是也又金碧中篇云此議者雄陽即是雄黃玄是汞雌是雌黃言將雄曾搗為泥上合蓋雌黃和燒礜石末為下合蓋皆和左味為泥包裹乾汞砂如毬子形納於金鼎中不者土器中周一年之火成名曰紫金還丹然㸃化五金服之長生如論此契中不用雌雄用鉛精為根養汞一味而成正陽真一神丹也神仙羽化中篇云將欲制之黃牙為根牙者鉛精也下篇又云挺除武都是據此一句不合用雄雌只用鉛汞二寶故西國貴黃丹中國貴朱汞為鉛丹中國所出故號中丹混沌既交接權輿樹根基樹者汞也根基者黃牙也權輿始也坤鼎也言汞得華黃牙混沌交接入於鼎中而自成丹故萬物皆因元始元始是天地之氣乾坤所育故乾坤為器生長成丹又云坤是雌黃混雜金為丹故云根基也經營養鄞鄂言金汞得火一年經狀如嚴霜亦似魚鱗起凝神以成軀軀體也凝言金汞得火先液後凝合為一體而為神丹故十一月一陽爻生易曰初六履霜堅冰陰始凝也故合丹起取十一月上元日子時一陽爻生發火制於汞陰被陽伏陰故凝一體衆夫以出蠕動莫不由言十一月一陽爻生坤一爻化為震陽氣動震為雷為春蟄蟲皆動莫不由陰陽之氣也喻汞為蠕得太陽之火氣又一陽爻生之發火汞又是擁陰陽感應所以震動欲飛衆夫者是衆共造丹之首所以其汞欲飛被人衆等將火所制欲飛欲伏所以蠕出震衆動而不自由喻於萬物蠕蠢皆由道之所生所以仙人得丹所化變為金骨玉體莫不由丹之所化也於是仲尼贊洪濛乾坤得洞虛乾坤者釜也洞爐也虛宿火言金汞得火在器中通暢也稽古當元皇關雎建始初元皇是初皇太上元始皇老君所建此神丹伏制之法鍊汞成丹令人長生所服羽化關者閉也雎者汞也亦號姹女關閉汞入鼎中文火養之不令飛散詩云關關雎鳩雌雄相命喻其汞得金花相和順是雌雄相命成丹也若無雌雄將何伏制變化成丹雄者汞也雌者鉛精也九元君曰單服其汞硃名曰孤陽單服其鉛花名曰孤陰故鉛汞相須而成丹也又經云凡鍊鉛精固我軀命七返硃砂變我常性又云化汞為丹可坐玉壇夫丹不得陰陽而成終無得理二味成丹同服正合陰陽之道經云借鉛氣為丹復須出鉛單服汞丹亦當有理若是九轉鉛花即堪久服若一轉花牙為種理然須出除鉛恐鉛使人出鉛法成砂伏火後水團藥為團用黃丹水溲其砂坐甑上四邊著火以鼓之其鉛自化漏出其汞獨坐零壠而坐出鉛了又入合中養六十日成丹經紫色即休又在合中時以急火逼之上安水盤其藥獨坐中央或吐出鉛上成鉛餅名曰鉛脫胎法故云用鉛精為種其汞伏化成丹後自透出其鉛鉛久乃為灰或火太盛其花牙化為鉛裏汞於中而自成丹也亦止出鉛灰上罕見今人略得其法云用七返硃砂和九鍊鉛粉入鼎而燒不測其理不曉陰陽運火度數汞即飛走唯鉛得在色似黃丹即云用汞伏火成丹矣故令人服者腰重體沈瘦人衰陰必無長生之理伏火試之即知若鉛火燒即有汁硃生冷之即軟白而重若伏火燒之即與火同歸本色紅紫如粉指楷之入故知所服非伏火汞不可服夫大丹但從鉛起鉛盡汞伏即可服之若不從鉛必無得理其鉛須九轉精花非白鉛也若能七返亦妙也冠婚氣相紐言汞得鉛伏如夫妻汞為夫鉛為妻故為冠婚氣者火也得火即相合和紐結如夫妻會陰陽之氣乃得相交結元年乃芽滋元者周年也布六十日為一元遁甲經云六十甲子為一太元其汞經一年火氣即陰陽交媾因肇立形萌芽乃生滋茂成丹赤索美理謂汞從十一月起首漸漸滋生也夫運卦定元氣者五日一行旬至十五旬甲子是六旬六甲訖一日又六十時一日運行亦須取一元氣足也聖人不虛生聖人言太上真人變化大丹令人長生羽化唯汞靈變非聖人不能知故立此法不虛生上觀顯天符言符者直符也徐真人仰觀卦象以定陰陽言上釜底玄黑如天下釜如地中居日月以表三才故託顯於天地日月星辰故汞象日以鉛象月以器象星上下二釜以為天地故大丹象日月之精通自然變化如符若契故顯天符符者天之信故立易卦象焉天符有進退進退者直符也定陰陽加减炭數十一月一陽爻生進一陰爻退至五月一陰爻追一陽爻退退時减炭過一斤半進時加炭不過三斤屈伸以應時言朔至望伸從望至晦屈屈時陰消伸時陽息息時加炭消時減炭火訣具明之故易統天心易者日月也是鉛汞也在於器中器如天故居天心所以易統論天地之事故立象以盡言立言以盡意此已前論丹意從此以後論火至喪其朋復卦建始萌復卦以明初起火十一月坤卦一陽爻化為震復卦始者初也初從復卦而起漸立萌芽而既生長終於乾長子繼父體既震卦以明其變震是乾之長子謂坤一爻化為震至四月成乾卦故繼父體也因母立兆基既坤卦以明其化坤為震母所以因母立兆基而化為震消息應鍾律黃鍾是十一月之律管名也故黃鍾是十一月一陽爻生之律息至五月應於蕤賔之律消也十二月二陽爻生律大吕臨卦也正月三陽爻生律太蔟泰卦二月四陽爻生律夾鍾大壯卦三月五陽爻生律名姑洗夬卦四月六陽爻生陽欲絶陰氣興律仲吕乾卦是坤一爻生陽息也至五月變乾陽爻一陰爻生律蕤賔遘卦六月二陰爻生律林鍾遁卦七月三陰爻生律夷則否卦八月四陰爻生律南吕觀卦九月五陰爻生律無射剝卦十月陰氣滅陽氣興應鍾之律坤卦故陰為消陽為息輪環不息運此二卦寒爻看火所以真人殷勤屬在於火其火是陰陽之氣也故火急即藥燋而失火緩又恐不伏所以令消息應律候則炭數其藥不失色而滋潤故一年用乾坤二卦二卦有十二爻一爻主一月又一月用二卦主二日半乾坤各主十五日又一日用二卦一卦主一時是故須消息年月及日加减炭數應於鍾律不失之也升降據斗樞從子至巳陽降午至亥陰升升之時鼎口向上降之時鼎口向下只論反輪鼎器又是爐上安斗柄隨月建而順轉亦然此月建及十二時著火三日出為爽震受庚西方既震卦以明言月初三日月出西方庚地爽明也庚屬震為坤一爻化為震是一陽爻生故震以明初一日發火陽火陽爻當得火氣汞一兩變困二日陰又起汞又欲飛三日陽爻又伏汞又欲伏十五日內汞一飛一伏至十五日外汞半伏狀如月圓滿稍乾未全伏火八日兊受丁上弦平如繩既兊卦以明其中兊是西方金其卦一陰爻在上二陽爻在下以二陽爻故月八日月出於丁丁者兊也言汞得八日火氣金汞相入成汁而平未變化十五乾體就盛滿甲東方既乾卦以明其體至十五日火變坤至乾故金汞十五日稍乾就剛卦如半月圓滿又其日日出東方三陽爻足故云滿甲屬乾也蟾蜍與兔焕日月兩氣雙蟾蜍是月精鉛是也兔是日精汞是也言日月二精之氣故云雙也焕者明也言汞十五日雖乾如水圓滿明淨仍未矩火若黃白一月伏火若作大丹其汞三百五十日伏火矣仍未成丹喻月水之精不能自明皆假日照言汞雖靈不得九轉鉛精不能自伏火化成丹故經云覆雞須得子種禾須得粟非類不生長汞非鉛為種不成丹黃白非金銀所為句而不成寶也似兔日之精吐光射於月故云兔焕明蟾蜍視卦節兔者吐生光視視也鉛視汞汞即鉛視汞汞即交汞乃得鉛鉛則吐光得火已伏俱吐精光似月雖明假日所照光射天下至月晦日月即同宿二光並相映不明名之變化至月晦即相離離而明八日兔形消十五日蟾蜍全視故言焕至十六日兔景消吐去其光故蟾蜍視卦節七八道以訖屈折低下降既此卦以明其陰陽之正位矣十五日其陽折損月滿則虧形漸消滅變乾為巽折剛為柔七八是十五日至望亦如從至中用此故借此卦用以成乾卦象故云乾以道訖從朔十六轉受統巽辛見平明既巽卦以明其减至十六日變乾一爻為巽卦一陰爻生變剛為柔巽受乾化故云受統統領也是巽受領也為月十六日月出於巽行至辛地即乃平明言至十六日光明欲伏火而成其丹艮直於丙南下弦二十三既艮卦以明其止伏艮卦一陽爻在上二陰在下二陰爻生其乾漸損變為艮二十三日其月行至丙即平明言汞至二十三日如山不動魚鱗以成若作黃白伏火艮止也坤乙三十日東北喪其朋既坤卦以明其終乾以損盡三陰爻生變而成坤坤者陰陰初坤屬乙也又其月三十日月虧於乙地乙是坤之位而居西南今見乙地東方晦朔交分從艮為坤故曰東北喪朋易坤卦曰東北喪朋乃終有慶慶者喜以陰就陽喻鉛汞得火交媾後終成丹而喜也若為黃白是一月用功即了若作大丹即一年火氣畢小還丹成也若是月一月盡以變乾為坤月月輪環周而復始終乎一年即周天火氣足節盡相禪與繼際復生龍節盡是一月盡也禪與者是從月朔分交爻之際又從坤一爻生震震為龍故云生龍是前一月畢以將生汞添之若是金丹即添龍減虎入鼎重修又重坤初六一陽爻而起為復卦故坤節盡震復受更依前相繼坤際而起壬癸配甲乙甲是陽之始壬是陽之終乙是陰之始癸是陰之終乾主甲壬坤主乙癸乾太始坤代有終以明變化一周旋也亦為藥物甲乙青龍是汞壬癸玄武為鉛以二物相配乾坤括始終言一年一月一日皆用乾坤二卦運火言初發火從乾起坤即是初超首也常用此二卦故乾為陰之初坤為陽之初乾生於始始初也坤主於終終月末也故用乾坤二卦輪環相括結也七八數十五七八是十五日即是汞得十五日火九六亦相應四者合三十易氣索滅藏九六十五日并上七八合三十以一月火運訖易者藥也德火運陰陽之氣月月漸滅藏伏火也故陽滅即陰藏一月一周旋故七為少陽八為少陰九為老陽六為老陰四者合為三十成一月故有陰陽之氣而有滅藏也象彼仲冬節草木皆摧傷佐陽詰商旅人君深自藏象時順節令閉口不用談天道甚浩廣太玄元形容虛寂不可覩匡郭以消亡謬誤失事緒言還自敗傷别序斯四象以曉後生盲八卦列布輝運移不失中八卦列布爐八方輝火也言太一爐布卦於八方運火於十二辰坎為陽中陰為離中不失一陰一陽之道鼎在中其運火轉鼎不失中也故乾甲坤乙天地定位艮丙兊丁山澤通氣震庚巽辛雷風相薄坎戊離巳水火不相射所以日月行於八卦而經黃道故不失中元精眇難覩元精汞也眇純粹精喻金汞禀陰陽二氣象色精微是天地之靈眇難覩不可見也推度效符證言運火行卦皆周天法度以取真符為證居則觀其象准儀其形容象謂日月在天成象在地成形運火觀鼎不得失儀式推陰陽之氣象時而動故易者觀其氣象察其成形以為儀准所以徐真人仰觀卦象丹道准此也立表以為範範法也言爐上安筒晝作十二辰形為漏刻子時即鼠頭辰現以順次見之運火轉亦一辰一移表於十二辰不令有失也候占定吉凶言依漏刻占候十二卦以定吉凶發號順時令勿失爻動時時謂十二時令順四時勿廢其號令故春養秋成夏長冬藏剛極則亢陰極則邪一以貫之莫失四時之道若巽卦先庚蠱卦先甲言運火轉器皆依乾坤二卦又生變發動順時應令者也上察河圖文文天文也河圖八卦也言運火常察八卦所在故易曰觀乎天文以察時變下序地形流序置也言上置爐竈藥院等須擇名山選於勝地順其地形水流向利則吉也中稽於人情論合丹好道稽考也同共營丹之士須考其情和純志道即可共為事丹道參合考三才三才天地人也夫合丹鍊藥事乃非輕上擇吉辰則其星象下觀其地背陰向陽中考人情宜須溫善飛丹鍊石皆通神明者不擇地山精損人不定陰陽丹有危敗自心有慮處同伴亦疑二人如此順和不可造次營合故河洛出圖聖人所作如周召相宅營於洛汭三才若有備必無休咎動則循卦節節言冬夏二至夏至後依乾坤卦所以運火皆據乾坤爻動而變靜則因彖辭故彖者言乎象爻者言乎變所以陽動陰靜因循卦節言運火皆逐陰陽動靜變化如彖辭動靜乾坤用施行天下然後治可不順乎言若依乾坤運轉剛柔施行何所不從故乾道施仁坤道施義故天下理四時豈不順乎如君臣有德施行萬姓宇宙之間可不順之安泰也御政之首御統也政理也首始也言常守御依理存終始治也管括微密管籥也括結也微細也言固濟如關結鎖籥令甚微細牢密其精不失也開舒布寶言每月一開研治陶洗增龍減虎塗土更依前月安布二寶內於器中日滿開舒成丹要道魁柄統化綱紐紐帶也言爐上安稱莖以北斗柄承其漏水斗柄指月建轉斗鼎運火皆以助之紐是斗邊安之又伏汞作乾銀壺子即著小長鎖子繫如帶常紐繫鼎懸爐中汞若欲走其鎖即動即須蘸水又丹器若鎖鼎日然須蘸水者西方之王金得剛而制喻將伏汞必順無失又易者是變化之綱紐還丹亦然爻象動內吉凶始起依爻象卦順陰陽而動鼎內吉凶起失順之五緯錯順應而感動五緯五星也言器為鎮星火為熒惑星上安水為北辰星金花為太白星汞為歲星四時若應必無動敗不以丹則無感應四七乖戾侈離俯仰四七二十八宿也侈奢也人若奢佚不勤藥則離散俯仰者是一日反鼎也故運火須依二十八宿也文昌總録文昌者言北斗邊六星名主六宫也凡典録總稱詰問衆星喻丹道皆依星象主之詰責台輔輔是北斗輔星也是鼎言上安斗下安鼎象之北斗星台三台星名也三釘配合也各有所主令文星主也官有司各典所部部管也司掌也言燒大丹皆取象天地星宿日月各有所掌管典録者也日合五行精日者汞也汞感五行之精上升為日硃砂為火火精化為青龍為木精水銀為水精也其汞形而白如銀號為濕銀為金精化為金花又為土精故合五行精也月受六律紀月金公也屬陰陰六為紀汞陽六為律調金汞含陰陽之正氣故受律紀之德而為丹五六三十度度竟復終始五六三十日是一月也取前日月借五六之數以為一月故每月看所以不過一月度者是度數計一日一月一年皆周天度數一日行一度三百六十日一周天月一日行十二度一云十三度一月一周天天則一日一夜行三百六十度四分度之一一周天三十日皆日月一合正月合在亥二月合在戌左行乃在十二月合在子所以運火皆依二十八宿度數遍曆看之終始者是一月度畢又一月起者原本要終存亡之緒陽為始陰為終陽亢陰極除邪則亡原始反終死亡之道也物極則反月盡復生所以每月一開看知存亡得失更續緒相添入更造也或君驕逸抗滿違道君是火號曰陽君若文武不調必有抗逸於道又君者為金不得多分兩者也或臣懷佞行不順軌臣陰水也上安水當行順軌令平而滿又云汞若多分兩於雄黃失切須愼之弦望盈縮乘變吝咎言汞得火八日上弦欲平生至十五日望欲乾成砂二十三日下弦欲伏化故金汞一月之間乃有盈縮故象日月有盈昃也若不順即有吝咎如君臣不務於道如日月薄蝕五星孛彗天垂殃咎若修丹泄穢則神靈懲罰殃咎故注精謹者執法刺機詰過移主言修丹運火心不精勤不執法録致失機過主者汞也心必移動不在如國有執正忠臣見君有過方便諫之冀君應機移改若丹術不修精謹神必殃過人也辰極受正辰北辰星也言鼎如北辰星之不移正受靈汞無不失衆星仰之亦依日辰正位而行者也優游任下任下火也任火調適汞在器中優游四時又失文武不均下火養之火若急即藥飛有失若在藥亦燋枯色弱也喻如北辰為君受國王理委以臣佐優游百姓如北辰衆星所仰之明堂政德國無害道明堂言器也火字于明爐均調鼎器堅固蒙密即無害也爐喻國鼎喻君以政德興道天下太平國無邪害者也內以養巳安靜虛無巳者藥也內是器內若內外安靜即能養成丹無虛失如人凝淡虛寂其心安靜即內智自明養巳原本隱明內照形骸言金汞如日月為明隱於鼎內得火於金成汁受於汞形本為一體白而且靜內當自照火氣足後汞自吐出花居鉛上故見形骸此是元陰之丹若黃牙為根之丹汞入花芽之後研之成粉入鼎如丹其花芽得火日久自為灰形露出鉛骸喻如坐忘遺照玄覽澄凝內照自見五臟內朗明徹而成道也閉塞其兊築固靈株靈者汞也株者金花也兊者鼎口也築者固際也言牢固塞際口莫令靈汞飛失喻如人口為門舌為籥籥動即門開口舌不愼於禍而出三光陸沈溫養子珠珠子汞也亦名長生子亦名流珠三光者日月星也日為汞月為金星為鼎亦為藥三光者水土金三物也陸沈者火也謂金汞得火溫養變成丹喻三光者人之三宫陸沈為六府存三宫之氣灌於六府溫養精神神令不散魂魄長存丹道亦然得四時之火溫養三光神丹即成也視之不見近而易求言汞在其內變化不可得見其法在近而可易求故老子曰視之不見名曰夷夷者希夷之道故不可見求之不遠心悟乃通成准如銀壺伏汞為白汞在壺子內一時一分一四分度之一每上鼎為一刻一日一夜有二十四刻一月有七百二十刻計汞一月死伏火成寶也此是分刻非漏一日百刻也其汞若伏至月末其瓶通紅赤冷即白如微有黑㸃未伏此作黃白法其先結汞為砂入壺也視之不見為藥即不可見者也黃中漸通理潤澤達肌膚言金汞得火溫養玉之所化日月久後火多漸漸成丹紫色潤澤人之所服達於肌膚初正則終修言月初正理入器日終重以修理也幹立未可持幹乾華也言將本乾花芽研入亦可火鎔花成汁入汞或先乾汞硃砂皆立為本研入花芽等為末如粉可持入鼎不得其本為種類萬無一失成丹之日入幹持成丹之日入幹持幹也如人才雖幹秀道與行違託意自裁兼用勢望亦未可修於丹術故知修丹得本類如無本難成本是金花黃芽也一者已掩蔽俗人莫能知一者道也故人知一萬事畢一是水銀水銀屬北方水水數一一是法又一是鉛鉛黑屬水水數亦一鉛中有白金掩蔽鉛中子含其母二義故俗人莫能知也上德無為不以察求下德為之其用不休上德之人無名之士無為無事無欲無思心若死灰形同枯木坐忘內照唯慕長生不求利養乃修丹術志在求成唯在一心不以察求諸事下德之人是顯名之士用為而求口雖好道心在黃白唯貪名貴財色性耽學得丹方即顯且使用而不休泄漏天符去道甚遠若修丹者隱德合道即合大道丹法必成露泄名丹為科必敗矣上閉則稱有下閉則稱無無者以奉上上有神德居有者藥也無者空也上閉稱有者是上釜則藥飛上下閉則下釜即藥空以此返轉鼎器水奉上下故神丹上居上有下無是其理也此兩孔穴法吟氣亦相須言兩孔穴是上下二鼎也開閉汞於鼎中得火氣作呻吟聲故龍吟虎嘯龍虎在內故內相須從首至北論以運火卦爻鼎器君臣道德為此丹道至尊至貴故言君臣之德也以下漸論丹意者也知白守黑神明自來白是水銀黑是金公金公守得其汞故神明自來也白者金精黑者水基金精汞也為是金之孫又號濕銀故曰金精黑者金公金公屬北方水故曰水基白為銀是一義又金精者是汞入金公中吐花號曰金精亦名玄黃之花亦名金花故金公得汞即金花之精流見金公色黑即汞之根基而吐黃牙名曰金公黃之花亦號單門亦名紫粉亦號立制石亦名石膽亦名流珠亦名秋石亦名玄白亦名黃輕亦名天地之符亦名天地之約亦名河車亦名金狗亦云金虎甚有多名不能具録所以合丹不得花牙為根及塗鼎器及覆藉固際等萬無一成水者道樞其數名一為鉛汞俱屬北方水水數一謂天一以生水又道生一一為五行之初道之樞機故用鉛汞各一斤據此經所說用汞一斤應天之度應易之數即是陰元之丹以一斤為一劑若用朱砂一斤黃丹覆藉名陽元丹若專陽化之丹即用黃牙不者金花一兩為本月月而添九月計得三十斤亦名特行九轉法故還丹之法乃有數家變轉雖乃不同造作還同一法得理由人並是大丹但至伏火即是上上神仙之藥也陰陽之始玄含黃牙為鉛屬水故稱玄礦鉛內有黃牙如金狀故號黃牙五金之主北方河車故鉛外黑內懷金華陰者金公陽者汞五金者鉛名也亦金公也金公者鉛名也謂鉛內懷五彩造五色之金故號五金為汞之主為屬於水能載丹船又如車乘故號河車內有金色故懷金花若黃丹所化冷凝如鏡打破如馬牙乃號黃牙若貴黃牙者未抔𨥥鉛是其金花與黃牙雖俱出鉛中造作有别金花者是取九轉鉛去除上如鏡計一斤鉛投入汞四兩一云二兩諸家所說不同或云等分或云四六多應不爾唯三四為寶所以古人有祕入汞唯須急下火半日即金花吐狀如雲母五色玄黃以䥫七接取若金花令色不變如金即是汞花若冷後色變帶青青即是鉛花其花不中造亦無花出有汞即有花花盡更投汞取足即休亦云不要九轉鉛多應不爾不者亦須三轉始可出花若依此契云即將其花一斤煬成汁入汞一斤凝搗碎入鼎若專陽之丹即將花以鉛砂郁一百日令花赤色而褐一兩花入生汞一兩和研如粉入鼎其郁花名曰秋石亦名立制石作若特行將花塗鼎唯入生汞不限多少亦得成丹若作黃牙者取京丹一斤入汞四兩壽州瓷碗中唯火急鼓之成汁如鏡即下碗冷凝如黃金之色打破狀如馬牙用亦如金花餘說多誤也其郁花牙須入鉛砂中鍊金九轉者炒鉛為砂鼓砂為鉛如此九轉名曰九鉛之法未能具陳玄含者玄是汞含為鉛花花為黃牙故曰玄含黃牙被褐懷玉外為狂夫言鉛外黑帶黃故如被褐懷玉者內白如狂夫者鉛白如玉如狂夫被褐故曰狂夫也金為水母母藏子胎金者銀水者鉛鉛中有銀以為鉛母鉛是銀子故藏子胎水者金子子藏母胞母是銀水是鉛銀為子故居藏母胎胞故知其銀是七寶之良媒陰陽之骨髓經云莫敗我鉛廢我命金莫破我車廢我還家又云若鉛不真使汞難親其鉛若實不失家臣青腰使者赤血將軍和合兩姓異族同群所以大丹非鉛不成夫用鉛須得錯鉛鹹白膩者即出得花牙抔了者青淡無花也玄鉛青腰者曾青也赤血將軍者雄黃也二家一是汞一金花也周易參同契注卷上

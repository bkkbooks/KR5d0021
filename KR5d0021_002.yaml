body:
  text: 無名氏注真人至妙若有若無無是陽鉛也有是陰汞也又銀屬陽寶真人是太上寶人知鉛中有寶化汞為丹者矣髣佛大淵乍沈乍浮進而分布各守境隅大淵者是煬鉛成汁投汞入鉛汁汞入鉛中乍沈乍浮是作金花法其汞入鉛汁之中分布鉛內所以被鉛所守不得飛出境隅故知合丹先鍊鉛作花伏汞又一解大淵者是灰池抔鉛取銀故經云灰池炎灼鉛沈銀浮潔白見寶可造黃金二義俱通採之類白造之則朱鉛為表衛帛裹貞居言煬鉛成汁而白入汞造作色變如朱鉛為表上衛如帛鍊汞入內被裹漠之不得飛故貞正而居從白守黑至此論造花牙此後别陳入鼎方圓徑寸混而相扶先天地生生混雜也謂汞入鉛華中混雜相扶後入玄白金華鼎中汞是金體方圓一寸計重一斤契中所用一斤也先作鼎也上蓋為天下蓋為地故天地既立萬物生焉宇宙之間莫非天地所養故道生天地丹是於道故須天地所養所以先論鼎器而養成大丹也巍巍尊高言鼎在太一爐中三台之上獨尊而故巍巍焉所以道德尊高巍巍焉然故丹道至尊而高者也傍有垣闕垣墻是太一爐也言爐四而而開八門而通八風安十二突象十二時窟象十二辰乃有四層而應四時故云垣闕者也狀似蓬壺壺鼎也亦似投壺瓶準如鼎有數種樣似瓜形亦得方作亦得邊皆有取耳著小長鎖子用時時蘸水及稱若伏火為黃白即作銀壼蘆子徑二寸長一寸半受一斤汞蓬是爐爐按五嶽似蓬萊山環匝關閉四通踟蹰環匝者鼎四耳或二耳下關關之汞居內踟蹰不出守御密固固是固際守御是看火晝不得怠慢失固際最是急事固若不牢密藥即走失盡假在固密精華若無只有鉛丹在耳若銀壺子不謹密唯丹在汞走盡經云六一者以六及一為七合固際如漆物非乎七種泥若八石四神金英玉粉等丹即礜石粉赤石脂二味為上下可使灰鹽也著此丹唯在金花黃牙不者鉛砂皆細研和如泥用之上與鹽灰若銀壼蘆子即用大鵬砂和鍮銀末等𨎰下硇砂餘説云不灰木戎鹽等非也閼絶姦邪謂固際牢密即無敗虧邪飛失也曲閣相通以戒不虞虞失也言作雄雌犬牙相合外著象鼻殷勤深囑務在牢密可以無思難以愁勞神氣滿堂莫之能留守之者昌失之者亡神氣者火也堂者爐也滿者武火盛滿也其火若盛汞力難當滑利莫過於汞去之無蹤尋之無所故須牢固際若密鼎無穿穴損壞得四時火性文武應期所以無諸多思在即昌盛成即為丹失即消亡凡欲飛鍊先鍊鼎器後明固際火氣均調勤心不怠豈有損敗也動靜休息常與人俱言反覆鼎器及運火常須三人看守故陽動陰靜或進退不得離爐思有動乃無休息故常與人俱是非歷藏法內視有所思歷遍也言運火動氣皆歷星宿藏法得所又其室內須得清淨燒辟鬼九爐畫五嶽真形八方真文天童玉女八公九真十二神王三大將軍壇八方懸鏡四面卓刀燒香步虛清淨潔戒及精思常存太上九真八聖玉女仙童天兵力士左右龍虎前後朱雀玄武在一室之內若得其丹妙理不能繪畫形象有置太一爐但清淨思存衆聖隨事爐竈亦得履行步斗宿言房內壇中初發火及雷雨惡風等皆須禹步步斗星三步九迹六甲次日辰運大皆依十二辰次第而轉曆六十甲子從先天至此論鼎及固際運火作法此再三深屬者又令人細心也但初文後武漸漸養火即得不失陰道厭一九濁亂弄元胞陰道者陰元法也一是鉛精屬北方坎水水數一九者汞也汞為朱砂生屬於南方離火數九以煬鉛精為水投入鍊汞相和得亂汞壓在鉛鉛乃蔽其汞在鉛內如子居胎不得飛遁被鉛胞包裹或上或下故云弄胞也食氣鳴腸胃吐正吸所邪邪是鉛正是汞氣是火言汞得火氣相食乃成一體故龍吐虎吸言龍虎呼吸也汞於鉛內故澒鳴腸胃日滿已後其汞吐出鉛上狀如朱砂其色紅紫名曰正陽丹也俗喻人服氣吐死納生也晝夜不卧寐陽明未常休陽明火也言一年之內上至三年朝夜火不得休息俗喻朝夜服氣無有休息身體以疲倦恍惚狀若癡言汞在鉛花汁中以經晝夜火稍恍惚狀若癡伏亦喻人侍其爐火日夜不休以至疲倦神情恍惚如癡又作丹及黃白皆先煮汞結為砂若丹用三年左味以入金花和煮亦入銀器中煮續續向四邊刮取乾汞若黃白以對半入母同煮汞以成砂如石將砂入器中一百二十日伏火為寶以充用不堪為藥為有金鉛故也若作九轉丹煮汞為砂搗碎入鼎五符覆藉若此經正議如前金汞入鼎俗喻服氣休糧精神恍惚身體癡倦矣百脈鼎沸馳不得清澄居言汞居鉛內在鼎中被火迫常漫湧沸汞馳入鉛百脈中不得清澄居而俗喻從服食其氣咽元至此氣至丹田滿其百脈常若雷鳴亦如沸湯至久亦不得長生虛動疲倦不得丹服神若如癡終無長生之理也纍土立壇宇朝暮敬祭祀言丹院內立壇朝暮祭祀俗喻人求道立壇對祭勤苦亦不能得道鬼物見形象夢寐感慨之言術士恭勤爐火常以精心得鬼神見護夜夢神感教汞也亦喻人立壇祭祀感得鬼見夢通謂言得道也心歡意喜悅自為必延期期壽年也為心身勤苦得神助心意喜悅神丹一成服必延年不死俗喻感得鬼見夢祐通心將喜悅言得長生遽以夭命死腐露其形骸言汞一年伏火已後吐出鉛上伏死成丹名曰正陽之丹故曰伏火腐露其形也經云十月脫出其胞是汞火足脫出鉛上也俗喻人求道服氣休糧立壇勤祭感夢神現心懷其喜意謂得長生之道如此之輩不免其死不得大丹服之終不免腐露而死者也舉錯輒有為悖逆失樞機言伏汞為丹悖不得理輒自氣意心粗逆失樞機之祕法若求法不明費火喪財遽失生路而夭其命假得丹成不曉出毒輒為便服為毒所中亦喪其命喻如人不得其丹理徒費其功服氣立壇終不免死失其機要也諸術甚衆多千有萬餘言言飛丹鍊石千萬餘方大丹之祕不過一二具此參同契經內亦説三二之法但明其金石陰陽藥性但得汞伏火成丹紫色即是大還丹藥任諸方所説終不離鉛汞但學鍊鉛精妙即是伏得汞也無其種類萬無成日乃妙者要務在由人制作故知學道須廣集經方莫耻下問道無不成也若恃心高自執一理必不能成成亦不妙所以其丹不出鉛汞也古歌曰白汞生朱砂黑汞化黃丹其中數九九變化五三般若至紫河車黃金無處安故知大丹不離鉛汞只是變化由人且大丹若化得五金入汞成寶始是大還丹也罕見今人學得一法制汞始至伏火即云大還丹上更無法甚愚甚愚夫大丹但莫著金銀石藥等所雜即是上無毒神丹若雜諸石只可治病有毒損人但調得鉛汞即是長生神丹也又見愚人只得調鉛制汞之法云炒鉛九轉為丹燒汞七返為朱相和入鼎雄雌所制礜石固際或黃丹蕩治亦有取銀為末用金為泥將和雄雌曾等飛鍊入瓶一年之火伏養及其年畢無有半成唯有金銀鉛在餘盡為灰靈汞獨飛更無一分愚瞽之士云是神丹服後不調體沈腰重忽有毒發便當傷逝即云犯觸被神懲罰據此不知藥性何大之甚故人命至重一死更無再生服毒乃在其身仙路如何可望但明鉛汞為丹雖未至精但得伏火即是長生之藥雖知用鉛仍不得鉛居汞內須去鉛盡然可服之故暫借鉛為根豈應堪服故知其法甚多須廣商量不可造次得一小法即將世法言無過此法乃非也前却違黃老曲折戾九都夫飛丹鍊石起自黃老次太上老君九轉者是仙宫調服丹學道之士名戾九都者仙宫又是九教丹經是老君度關授與尹喜説三化五轉九還七返之法及諸丹術非其一二或前或後不依科禁故云前却曲折經法矣明者省厥旨曠然知所由令學丹術之士曠然明其法多集仙經自悟其理故知其所由也勤而從之夙夜不怠經營三載輕舉遠遊跨火不燋入水不濡能存能亡長樂無憂道成德就潛伏俟時言好道之人勤求丹術供侍爐火朝夕不休不敢怠墯乃經三載得丹成後服之得仙道成德就水火不害坐在立亡千變萬化役使鬼神壽同天地長樂何憂潛遁人間待時而仙也太一乃召移居中洲太一是仙伯中洲是仙宫也服丹之後金骨玉髓乃非凡體及行陰德精思坐忘餐霞行氣太一使玉童玉女取召入仙宫也功次上升應受圖籙言服半劑且住人間待功滿三千然後服盡一劑升天籙是仙人戒圖是五嶽真形圖一斤為一劑大還丹四兩為一劑此應是二斤藥也火記不虛作演易以明之火記者謂大還神丹象於周易以明其用爻卦轉鼎運火故託於周易明述其妙而不虛作之也偃月法鼎爐爐鍋也言鼎如仰月亦如瓜形亦有太一鼎也白虎為熬樞草堂注云白虎為礜石熬煎熬也言用礜石為汞之樞機恐不然為礜言至毒若作乾汞為白即用特生鸛巢中者或用紫礜石及烏卓草為灰淋煮汞不然三毒灰五礬二使藥等若大丹大藥不應用礜石據白虎者又二議若作白即用銀為壺蘆子號銀為白虎若依此契白虎者是金花玄白等和醢研如泥塗鼎為汞之樞機也熬為火也承日為流珠汞是日精因日而生光明流轉滑利如珠故曰流珠是鉛入汞為九轉花承日為流珠又將玄白釜盛汞為砂如珠亦曰流珠汞是日精故云承日青龍與之俱青龍是汞汞屬水水數一朱砂屬火火數二二與一成三三數屬木木位東方故號青龍將龍和流珠合為丹故與之俱前白虎俱也白虎者九鉛精為汞之樞機是熬鉛也化為汁投入青龍汞也得火已後吐花五色名曰流珠一名天地之符此符化重花汞為丹名曰還丹草堂云青龍是曾青應不然若作九丹即先用曾青為水此經應不用舉東以合西魂魄自相求東方是青龍屬木主肝肝是陽神曰魂魂是汞西方是白虎屬金金主肺肺是陰神曰魄魄是鉛故以鉛汞相合故以魂魄相求據經引東西求合豈是礜石曾青上弦兊數八下弦數亦八兩弦合其精乾坤體乃成二八應一斤易道正不傾銖有三百八十四亦應爻之計訣云上弦八金半斤汞也下弦八金半斤鉛花也兊主金故二八應一斤斤有三百八十四銖象易三百八十四爻汞為日鉛為月日月為易字故易不傾應計汞本屬金汞中有金金赤屬南方故號赤金鉛屬金者鉛中有銀銀白屬西方故稱白金又懷金花故號金又一釋作白法上弦兊八下弦兊八都十六兩銀為壺子作乾汞法兊者合也故乾坤乃成乾坤器也若正解是作藥斤兩也金入於猛火色不奪精光汞金之性本無損折得火不失精光成丹之後經火色不變有雜即變亦云金銀為器被火不損又云著金銀為丹金不失其性亦在自開闢已來日月不虧明喻日月自從本有天地開闢已來至今日月常明喻藥在鼎每月一開之看不有虧失也金不失其重日月形如常汞者金也體如金重且其汞自有日月之形在朱砂為日在汞為月故汞為日月為金也罕見愚人執此金議云大丹用金故不敢造不知其金是汞及金花古歌曰乍用還中寶不用錯中金豈用真金銀為丹言用者甚誤也金本從月生言金花本從鉛生鉛是北方水水為月故金本從月生金是鉛花者也朔受日之符日是汞謂坤卦皆從月朔一爻變為震震為直符復為直事震為下器盛汞故云受用朔朝用震卦暮用艮卦所用一日及一月用此二卦也又議是汞入鉛中而吐金花名曰天地之符故曰朔受日符也金反歸其母言汞本是金孫朱砂之子朱是汞母今燒汞成砂變砂為金故歸其母從金復化為砂號曰金砂還丹道畢月晦日包居言月晦火氣足是一小周天陰陽數備即重開研治又從月初一日起重包裹居之隱藏其垣郭沈淪於洞虛垣是太一爐郭是太一鼎虛是南方之火宿謂金汞藏鼎中得洞中之火潛陰伏隱而未見故曰沈淪金復其故性言汞本屬於金今得陰陽火養化成金砂故復其故性也威光鼎乃嬉嬉美也言丹欲畢汞為砂鼎藥乃有光明威德人乃嬉者也子午數合三子是水銀午是朱砂朱砂屬火火數二水銀屬水水數一一與二為三故合三也亦是汞一名而有二號居南北二方也戊巳號稱五戊是陽屬銀巳是陰屬鉛是北方水水數一內有銀為白金數四以一及四故稱五也亦金花於鉛汞中故稱五是也三五既和諧八石正綱紀三是水銀五是金花上二釋以三及五故云八及八月金王故八石世人不曉云用八石為大還丹甚誤也為汞得金俱共和諧丹之綱紀也呼吸相貪欲佇思為夫婦言汞屬木鉛屬金金是木夫木為金婦龍呼虎吸遂相貪欲勾制相伏故以佇思相為夫婦龍者汞虎者金花故知大還非陰陽同類而相伏所以諸石傍助不入其汞非金汞不可也黃土金之父黃土是金為鼎內塗玄白金花號曰金鼎非是用金銀為鼎為土能生萬物金之是土生故為金父金者是汞化為金砂又議號金化黃芽有戊巳之號戊巳屬土用和汞及塗鼎內又訣云黃土者雄雌砒流是也為四黃屬土土王四季無正形因火立名一王十八日託在四季用以為泥塗於鼎內此契寶不用四黃流珠水之母流珠是金花水是汞汞屬水故為水母又流珠金花之别名得汞亦為汞母水以土為鬼土填水不起草堂注云用黃土填壓上之多不然唯以諸訣皆云用金五符等覆藉不唯用土填壓用亦得故知土即是金花黃牙等水是汞被土伏故不起非硫黃為土用於化汞為朱朱雀為火精朱雀是火也南方火之宿日精執平調勝負勝負是升降升時加炭降時減炭平平者斗柄看斗所指定漏刻如知時候調火者也水盛火消滅俱死歸厚土水是鉛火是汞言水得火即煬成汁故曰盛也汞入其中得火汞死成砂砂如土如灰故歸厚土是也三性以合會本性共宗祖土是祖金花也一汞二金三朱本是一宗三性共奉土為祖所以宗祖共相會也巨勝以延年還丹可入口巨者大也大勝一切諸丹故稱巨勝巨勝是日名亦是還丹之别名亦名十勝丹亦名紫粉亦號金砂所以丹成服後延年益壽入口長生不死也金性不朽敗故為萬物寶汞本是金性今化為金砂此砂最尊最貴萬物之中上妙寶乃化五金所以金汞成丹服之與天地畢也其丹千變萬化人服之乃無休敗不死而得長生者也術士服食之壽命得長久言好道之人服此大還金丹壽長久變形神仙飛空土遊於四季守界定規矩土者黃土為鼎或以鐵鼎內塗黃土及塗黃牙及將覆黃牙藉故能守界定於規矩土為王於四季也又土者雄雌二黃也故雄為將能守四夷故云守界界者是色裹承汞也規者圓汞也矩者方金也土能制也故云界二義俱通金砂入五內金砂即大還丹也言汞本是金體經三年火及變為金砂五內者五臟言術人服金砂入五臟四肢霧散若風雨言凡人服金砂入五臟之內流散若風雨皆令暫死為身宿穢穀氣不除有七病九蟲三尸等皆在所以暫死蟲即蘇兼丹內或有礜石及雄黃曾青并火毒未除故令暫死亦有不死者或是一年之藥及無别毒藥又人常行修德休糧日久腸淨臟淨故不死故造大丹莫雜石藥若作黃白及點化五金制汞令乾若無毒制不能乾者也熏蒸達四肢顔色悅澤好言服丹後老得童顔四肢潤澤好筋堅髓滿鬢髮皆變黑服丹後白者變如黑更生易牙齒牙齒毁落者必更重生也老翁復丁壯言老翁反少歸童多力丁壯六十曰老人耆嫗成姹女女是處女服丹後顔色如處女老女曰嫗七十曰耆九十曰頥改形免世厄號之曰真人言人稟陰陽精成今鍊陰陽精為丹所以服丹之人改形易容生羽翮隱淪變化役使鬼神久視長生陰陽不能陶鑄水火不侵與死長辭壽同天地金骨玉髓號曰真人此是大丹之功積無限三災不能害也胡粉投炭中色壞還為鉛此喻水銀本是金今燒必成金變金為砂必成金砂還丹如胡粉本是炒鉛和酢鹽作令安火上炒必變為鉛冰雪得溫湯解釋成太玄太玄水也如冰雪得陽必化為水自相制伏變化又云玄伏金汞為丹豈不成也金以砂為主稟和於水銀金者久鍊鉛花也言將鉛出花名曰金砂將砂和水銀亦燒黃丹為黃牙亦名金砂亦將黃丹鼓燒出鉛炒鉛為砂亦鎔鉛化砂為汁入汞得理並通不曉者云將金銀作末為砂入汞甚非也此是作勾留黃白法若作丹非金花黃牙不成草堂云用朱砂及用黃金和水銀未能煬變化由其真終始自相因言金與汞為真自有變化為丹終始自相因非此真不入寶妙也欲作服食仙宜用同類者若合大丹為汞難制滑利又屬太陽不得其鉛金終無得理也其金屬太陰以陽得陰乃為同類夫大還丹者象自然天生還丹其自然丹生於有砂之地四千三百二十年即生生時光明照山徹於千里至三元之日上元紫微天官諸天仙人玉清仙官下採非凡世人之可得也生時上有曾青左有雄黃右有雌黃下有金砂南有朱砂北有水銀為天地太陰太陽沖氣交騰一千八十年則生金礦礦一千八十年生丹砂丹砂一千八十年生水銀水銀一千八十年生自然還丹合四千三百二十年計一年十二月有四千三百二十時一時為一年故則一年火氣成小還丹二年火氣成中還丹三年火氣成大還丹也為用乾坤二卦運火其二卦有十二爻一爻主二日半二爻主五日五日一行旬合六十時一爻三十時二爻六十時計一月三百六十時象一年三百六十日也是一月火氣足故一月一開以此計一年得四千三百二十年火氣足故成大還丹用三大元半及一小元長十年火氣言於中有閏及大小月也一千三百二十年為一大元六十年為一小元今造大還丹則此氣計火數而造也且朱汞專生以南為南方向太陽日氣盛照生焉十洲記云若扶南林邑及五天竺國朱砂狀如瓦礫今辰錦州及五溪甚多嶺南外國汞一斗一升始有百斤若辰錦州等汞每斗一百斤也據此辰州五溪汞為上也其汞有生有熟若天生流出者清而白利堪為丹若蒸燒水銀為熟白濁而鈍是粗燒之不堪入藥也只堪入粉家及金用所以燒大丹大藥皆取光明砂自燒出汞乃為丹也使丹砂大方三四寸有文理似馬齒光明通徹曰光明砂如小兒拳似人齒名朱兒似粟米大者名朱砂外白內紅名曰白馬齒砂但砂色紫色赤光明者為上次如石榴子亦可用無石即並堪也五金訣曰金得銀而虛銀得銅而疏銅得鐵而殊鐵得錫而俱銅得汞伏而無憂汞得金而濡金得雄而事通銀得雄而始終銅得雄而異性同鐵得雄而去危凶金得雌制一時銀得雌變無疑銅得雌成道去非鐵得雌自令堅持錫得雌成壠令宜故知物有同類非類難伏所以大還丹非陰陽伏制不成丹也故經云伏汞為丹可坐玉壇若獨制汞為丹為真一法亦名如意法亦名真一特行法九元子曰不許單制故用其鉛為單制汞名孤陽事須陰藥又訣云用銀為同類用銀為末八兩汞七兩雄黃一兩每月除虎添龍龍者生汞虎者伏汞乾銀亦是好法計大丹無理又法用銀器煮汞為砂後用雌雄曾流為泥裹汞砂入銀合子中礜石赤石脂固際赤鹽覆藉名曰特行此法亦同類多是小紫未審實成不成必有毒未審堪久服否又法有黃金和汞入雄又法朱砂和汞每月添朱砂名赤龍屢降白虎飲之又法朱砂和汞等分每七日添生硫黃待成砂入瓶亦有用銀朱汞一向十二月添雄修赤鹽覆藉總為同類若依此契即非唯金汞為真同類植禾當以粟喻如種禾須得粟為種作藥須得鉛丹為種丹成後用丹為種餘非種類伏雞用其子言伏雞須卵必得雞兒故還丹須金花為同類必成矣以類轉自然物成易陶冶同類易施功非種難為寶是以燕雀不生鳳狐兔不乳馬水流不炎上火熏不潤下言鉛汞所合事須諧和後得丹成復以丹為種故以物轉自然成易陶冶類若同豈不成寶哉不同類者燕雀豈生鳳狐兔不生馬水流必不向上火炎必不向下故知同類即成非類不可世間多學士高妙美良才邂逅不遭值耗火亡貨財言世人多好學長生神丹術士志慕爐火不遇明師示其真訣自恃才高學得一小法以意為之或云用金銀或云用雄雌曾空朱等或云一年或云六十日或云九轉斤兩不眀或伏得汞即言是大丹或成丹而又不得伏火或有敗失悵望即休或羞而不伏問於人以此懈怠經訣不明進退狐疑遂成敗失棄火損財如斯之輩多矣據案依託文妄以意為之端緒無因緣度量可操持搗治羌石膽雲母及礜磁硫黃燒豫章鉛澒相鍊治言好道爐火之士不得真訣遇一小法或尋古文及諸隱言又執此契云金是銀稱水為木云虎是礜云龍是曾青稱土為雄黃稱金花為白銀號黃牙為硫黃號秋石是礜石稱石膽云出蒲州一云羌道用碧翠者託意自能強稱我解豈知神方祕重隱亂真言豈石膽出於鉛中秋石黃牙俱出金公之體經云豫章者是道州古屬饒州豫章縣非今洪州豫章為道永等州出朱砂水銀今人將為用洪州豫章之土為器及搗雲母礜石磁石硫黃石膽為丹豈非大謬託意為之故經云持之有法禮則未忍悉陳程敷豈祕直説也如斯之士未足可言澒水銀之别名鼓下五石銅以之為簠樞簠樞器也不知其理妄將五金為鼎豈有得耶五星五金皆出石中故云五石非鼓石能出金銅也若伏乾汞為銀即須銀器若作丹須土鼎用鉛不鍊玄白金花塗內即成也雜姓不同種安肯合體居千舉必萬敗欲黠反成癡僥幸訖不遇聖人獨知之稚年至白首用索悵狐疑物非種類雜何可成千舉萬敗至老不愜心生悵望猶自狐疑又僥幸不服膺於師廣集經訣及參同契索盡財貨謬雜諸石至老不可得也背道守迷路履徑入曲邪言人尋參同契及隱訣云法非在此中不識真經妄屈曲邪路故把道守迷此之謂歟管窺不廣見難以揆方來謂人執一法或得一經一訣即云妙猶如管中窺明豈是廣見遠方處來若夫至聖不過伏羲始畫八卦效法天地伏羲太皥氏木德王仰效天象龍馬負圖由河出現而定八卦後神農重其卦引而申之為六十四卦繫云天生變化聖人則之文王帝之宗修而演爻辭後周文王演易而定爻辭繇言夫子庶聖雄記十翼以輔之夫子是衆聖之雄故作十翼爻辭彖繫卦象辭并前為十卷名曰十翼後夫子讚易道述彖象所以易者微妙之宗旨照玄志命之書故在夏曰連山在殷曰歸藏在周名周易在漢名太玄書在晉名同林故丹道至妙託易象焉三君天所挺迭興更御時優劣有步驟功德不相如言天下至聖無過伏羲文王孔子三君是天下之挺特晝卦演爻作十翼知盛衰猶不敢御爐火同彩不能明何況凡流而輒合造化此道幽玄親承火訣然可合之又三皇巳前人乃淳素五帝已後世法日澆所以古人用二味成丹後人乃知衆石所以論其功優劣不相得也制作有所踵言制作自有踵非類不成推度審分銖銖者一斤藥有三百八十四銖應天度數須審分銖應度數也有形易忖量言汞得金花為形為丹必成如作黃白用金銀和汞易忖量也無兆難慮謀謀計策也兆基本也汞不得金為基本難謀計故水火有形尚不可調制汞甚神化無兆實難謀思也造作令可法為世定詩書法則也言真人造作丹術著於經方在世人自不悟詩是古歌書是參同契故同契詳古歌而造俱流在契丹方了了人自不明其理謬自出意猶如孔子刪詩定禮汞為法則故丹術若不眀同契之人道必不成成亦不長不得神妙變化之理素無前識資因師學悟之素者白汞金鉛汞也非師不悟所以徐君自言因師始悟今言同契及别經訣多有隱祕或前或後故亂著文言素既不明皆因所學經師而悟者也浩若褰帷帳如曠野之中而無帷帳託空出意而造何益也瞑目登高臺閉目自意終無得理如瞑目上高臺而無所見如人好此丹道見登於此所費無成瞑目不悟火記六百篇所趣等不殊文字鄭重説俗人不熟思火記是丹經也言神丹大藥六百餘條雖有多方其趣雖殊終歸一理恐人不曉故文字重重而説何故不真説者為神丹祕重始不直説恐泄漏天機始祕此文又恐長生之道絶人不修道謗世無有長生神仙之藥又其道在近俗人自不熟思使尋金汞陰陽一金一石可曉者也竊代賢者談曷敢詐為辭辭者經方同契也言我此書實説不詐為謬傳於後代諸賢竊心見之須自思取悟若遂結舌瘖絶道獲罪誅始實説之恐人不遵道始結舌不言又恐道絶獲罪也寫情著竹帛恐泄天之符符汞也是天之心汞又生五符也猶豫獨增歎俯仰綴思愚謂始寫情竹帛流文恐泄漏不説道絶獲罪於身故猶豫二途思情綴録故隱言亂説始之有法程未忍悉陳敷言修治丹法自有法程未忍悉陳敷露程數略述其綱紀開端見枝條所作有法未能盡説略述紀綱開視枝條敷露此法故制伏之道表以天心立象以言象若不立天心不可見故以敷露枝條知其表象從此以後直論金汞成丹所以重程敷露其條也以金為隄防水入乃優遊金者是九鍊鉛精金花牙也以金花為隄防能制汞其隄防是勾留法能勾其汞故曰隄防制汞成丹非用金銀勾汞用即是黃白勾留法又云用金為鼎號曰隄防此是銀壺子法非丹所用所以其汞得金花相入相諧無失故曰優遊本云水為木字非也云用曾青為木未詳也金計有十五用金花十五兩水銀性燥難制故用金花不者黃牙勾留為根以陰制陽也水數亦如之水是水銀亦十五兩象一月之數草堂云水為木字云用曾青十五兩為五分則三兩為一分云金花三分用九兩曾青二分用六兩其汞即用一斤若論丹法甚真唯曾青有疑口訣皆云不用石藥當審用曾青通否計曾青明目來神是金之精入亦何妨若云水為木字呼曾青恐有非又云金是汞義亦通云木是曾青用十五兩更詳準如草堂真人豈是凡夫注應不謬若將水銀為木呼號青龍既有金數水銀之數何在如有金汞數必即合相汞對必非曾青水銀真也古人特行唯用曾青一味制汞成丹今此契唯論金汞二物應無曾青臨爐定銖兩五分水有餘五分者即三兩為一分五分者即是用十五兩餘者加一兩為一斤有三百八十四銖象其易所以合用一斤前云用十五兩雖象半月未應易之道也臨著餘加一兩成十六兩為一斤定也又釋餘者為一斤汞重如金金二寸可有十分五分是汞餘五分是金如前十五兩故同前十五兩乾體就後十五兩坤乙成三十日為一月故金汞各十五兩者也二者以為真唯金汞二物為真據此可言將為木號為曾青假如用曾青未合言數者也金重如本初言金汞之體常如初重故令時時上稱稱莫令失失即火急急即微退火其三遂不入水二與之俱三物相含受變化狀若神一金二汞水是三非三味也云其三不入二者為真何得三物唯金汞二真得火十月脫胎後六十日變化為正陽神丹者也下有太陽氣氣火也言鼎下有火夫合鍊成敗在火火急有失在亦枯燋寬又不休狀如驅雞準如汞甚難得成火前云四時火者令人細心但火從文入武即得也伏蒸須臾間先液而後凝號曰黃輿焉為未消花為液别暖汞投中一云入曾青末去火令冷搗碎入鼎下火漸漸如蒸物狀年月滿為丹黃金紫色故號黃輿亦云黃輿如車輿服藥升人故號黃輿又初伏汞須臾之間從液後凝色微帶青黃亦云黃輿此一注至前以金為隄防具論藥味斤兩合治入鼎已訖如若不悟不可求道矣歲月將欲訖毁性傷壽年言年月滿為汞性傷毁而自然伏火形體為灰土狀似明窗塵言經十月脫出胎其汞獨出鉛上紅赤若陰陽二氣從冬至起首至夏至文火至冬至武火後開其汞亦出鉛上名曰正陽丹狀如塵灰收取其藥更入鼎夫汞火氣未足皆黑如死炭灰人至此皆心退休罷不知從此但與火其藥色即歸就紫如燒小還丹令伏火亦至黑灰從此變褐後為紅紫之色故後人見黑便休夫汞成粉皆輕如塵失其汞體莫疑但任以年日月長久火養之色變自成丹也但研之即知重但以此一年火即成塵更入赤門又經一年即成大丹搗治併合之馳入赤色門門者是赤土鼎以金花塗鼎之令赤是故收其前塵藥腳搗治入鼎二元云鍊丹即收下腳鉛砂又如黃土搗為泥塗鼎然正陽之藥經武火六十日其丹紫色未紫更燒故紫赤為上上青黑為下下若二元丹無覆藉若九轉丹每轉用玄白金花四兩覆藉若紫遊丹用赤鹽覆藉呼為赤門固塞其際會務令完緻堅言固際須令牢密炎火張於下言下火常炎炎不得火猛别記出先小武火七十日者也晝夜聲正勤言汞得火作聲狀似嬰兒啼啼聲若息其汞即是伏火故其火晝夜更不得停始文使可修始初也初文火也别記云三百六十日文火謂中間文又前云炎炎今何須文其汞伏火故令小武火也終竟武乃陳月末年終事須武火後須大武火鼎須與火同色又專陽丹須經大武火方伏火後須化成鋌搗為末開頭燒經一伏時此應須三年火一年火亦得服未有變化三年丹為上别記云若三十日武火即成一年火也候視加謹愼審察調寒溫周旋十二節節盡更親觀每一月一開看洗重入鼎節是一月故經十二節也氣索命將絶休死亡魄魂氣火也索盡也言經十二月火畢汞死伏火魂日是汞也魄月是鉛也故一年魂魄散化為大丹也色轉更為紫赫然成還丹還丹紫色一名紫金砂二名紫粉三名河車四名巨勝巨勝者日名也其汞象曰巨勝五名十勝丹六名大流靈砂謂老君度關津往流沙西國故留此法授與尹喜名曰流靈砂色若不紫赤不名為大藥未赤紫更燒若色如黃丹赤土未名為丹只是小伏火汞藥也陰陽相飲食陽汞陰金謂金得汞自相飲食伏制成丹也交感道自然謂金汞相交感故丹道自然成亦長生能除萬病若伏火乾汞只堪為膏為粉服亦長年亦非大丹大丹者為汞本是金孫朱砂之子今令歸本復如金體赤紫如丹故曰還丹丹者赤色之名還者返歸之義故曰還丹若不者何以為還丹粉提以一丸刀圭最為神去毒了以棗肉丸不者黃龍膏為丸丸如梧桐子大一丸是一刀圭圭是金之一小兩一刀圭通二十四氣丹成取一刀圭鼓成金若不化五金不可輒服其丹生有毒未有靈化更依前燒之成金有靈化深紫色始號為大還丹服此一丸即通神也又將一刀圭化五金及一斤生汞立成黃金若至此即四兩為一劑若且住人間即服半劑若欲沖天即服盡一劑推演詮五行較約而不煩舉水以激火掩然滅光榮言大丹推詮不出五行也汞屬水朱砂屬火鉛銀屬金曾青屬木雄黃屬土只如大丹唯用二寶金汞是也其金汞自有五行之名朱砂屬火水銀屬木鉛黑屬水銀白屬金又號戊己以當屬土故曰五行激者灌也水陰火陽以水灌火陰入滅陽故曰滅光榮也水是金花火是真汞以金得汞是水灌火中故不煩非上有水下有火也日月相激薄常存晦朔間日汞月金常存一月之間候火存亡朔月初晦月盡也一陰一陽之間常自激薄也水盛坎侵陽火衰離晝昏坎為水為月離為火為日陽乾旦也晝陰坤昏以著也言陽時水王至六日後坤故侵陽即火衰名者以定情字者緣性言言汞一是太陽生金含朱赤色故曰名丹濕如水白如銀故號水銀白赤之情似銀之性故號水銀是也金來歸性初乃得稱還丹言水銀本是金性丹者赤色之名還者返歸之義伏汞為朱變朱為丹故曰還丹此為正陽名外還丹為人素稟沖和元氣虛無自然而生本從空來今服丹後令歸虛無升天而去故曰還丹丹丘仙宫地名雖服外還丹亦服內還丹內是還精補腦故二還同服乃得長生也吾不敢虛託倣效聖人文徐真人云吾録此龍虎上經大還之法不敢妄託倣效聖人文則易之文也先聖一本云古記提龍虎虎是金花龍是金汞所以上古先聖號曰龍虎上經又一義直云水銀朱砂有龍虎之號故朱砂曰赤龍汞為白虎亦汞有二名汞為木精號曰青龍而白似銀號為白虎所以金花亦有龍虎之名為鉛若不投汞必無金花五色亦無花出假令冷後色青黑亦名龍虎所以作丹以花為虎以汞為龍將龍取龍以虎為虎非此二寶不能伏也假用雄曾入亦無妨久為灰亦無制伏之理只是用為傍助染色取氣也草堂注云虎是礜石號為白虎稱曾青為青龍既云曾青礜石為真將金汞何號應不然也直言龍虎者金花水銀亦不用金銀諸石也黃帝美金花若非金花為虎黃帝豈應美之為水銀姦滑性燥難伏為金花鉛入汞所成故是同類又有金性故能吸汞勾制相留變化為丹又金花有數法若得錯鉛白膩饒州者但猛火炒三轉可用不者但鍊了未抔熟鉛入仰月爐下火令急略除粗皮黑末令盡即投汞但猛下火食頃之間金花咄出又將此花煬成汁更投汞其花五色名曰天地之符亦名流珠花化汞為丹是也若一轉花用即須郁郁者是專陽丹法一兩花勾一兩汞研如粉入鼎鼎內用黃牙不去未郁花但一物即得為泥塗鼎內入汞可一月養之又二兩添二兩生汞月月以一倚添得此汞色如土青黑添金得一百日後用九轉鉛砂育之令伏火色黃微赤更月一日一度蘸水若土鼎不須蘸熟鐵須蘸生鐵柔令為熟鐵若柔入土坑沒頭大火通赤一日一夜即熟若土鼎即用甘土及黃土漿並壽州破瓷末等分為之量大小厚作乾後用鉛砂研泥蘸揩之火漸爖之令赤熟後內塗花牙用將前未伏藥九月畢不要多亦得但三五月間者量多少旦伏亦得伏即將添了藥重入鼎一百五十日漸從文火入武臨未著大武火可一日二日又更將此藥煬成汁為鋌搗碎又更入鼎一月日不煬亦得服也前添汞火須養火不得猛火若陰元正陽之法即將再轉花不者一轉花不者九轉鉛煬成汁計一斤鉛入一斤汞從今年冬至至來年冬至畢畢日猛火一周其汞吐出鉛上收取其藥又入鼎中武火六十日名正陽丹丹畢若陽元法用朱砂以黃丹覆藉亦如陰元法若流珠九轉法但煮汞令乾治碎入鼎以金花玄白覆藉每月一開每日用四兩炭若良雪神水法火不録若此經唯煬花入汞如二元法唯用朱曾雄稍異即不著亦得是故黃帝唯重此金花也淮南鍊秋石秋石是將前金花入鉛砂一百日都名秋石又為金花屬西方西方為秋故號秋石劉演云草堂云礜石應非也礜至毒如何堪入藥唯四神八石丹用及乾汞家用此應不用故秋石可量淮南王立號豈應礜石淮南王重之亦如玄白出於鉛中號為石膽時人云用蒲州者豈非謬乎淮南王是漢劉安厲王之子封於淮南因號淮南王王性好道感八公授道王棄位隨八公往壽州飛鍊丹成而去今八公山見在王陽加黃牙黃牙是錯鉛及黃丹亦名京丹一斤用汞四兩入壽州瓷碗中猛火燒之食頃成水如鏡待冷凝如黃金打破如馬牙因號黃牙是王陽為金花秋石難作燒黃丹為上據力亦與金花同等稍優劣耳時人云金花為黃牙亦得終稍别耳更有人去硫黃及雌雄等甚謬也只據流黃制汞為朱豈知黃牙所出十仙記具明亦有鉛汞石膽黃礬所作此經應不用也唯鍇鉛及黃丹作為真王陽漢時有益州刺史常好道以作金救人故陽貴此立號黃牙故知人但調鉛得理即大還丹可致也賢者能特行不肖與母俱特行者是伏汞一味為丹非用二青也及四黃也母者金花也故上古真人唯謂汞一味任火日月久長火養成丹入曾青同養故上賢者是上古人也今不肖後賢者言與金花黃牙制力一同故云不肖不許與母俱也所計上古之人非一二年丹成也據九丹經云亦用金花塗鼎養汞豈應將汞獨入空鼎而成者何得陰陽龍虎之名必應加減别耳若論特行妙名曰孤陽九元君曰孤陽之丹不可輒服須借陰成丹若成鉛即盡何執特行而無陰藥準如特行其性甚冷丹成已後又熱毒性生為鉛屬水而汞屬火故須水滅火丹成無毒亦有伏得乾汞色如紅玻璃將為世絶作粉為膏而服五兩之後徹骨如氷而冷狀似長病人乾汞銀只可為世寶何得長生之理經訣具明陰陽龍虎而成豈獨化汞故汞為主金花為君曾青等使雄黃為佐君臣相使返惡伏制成丹入身散如風雨立能輸骨續筋故能長生不死也且天為陽地為陰日為陽月為陰一陰一陽曰道亦二氣相化萬物而生其中闕一不可豈去天留地去日留月故須金汞雄曾所成甚妙如不著雄曾其丹最尊至重也古今道由一對談咄耳謀自古及今唯一味為丹借鉛花句伏細論其金花亦與汞等分何妨對談不悟也學者加勉力留念深思惟至要言甚露昭昭不我欺昭明也我示此法深思此經我不欺謬於汝其加勉力者為昔特行任士養今令加勉力金花黃牙之力而成大還丹矣周易參同契注卷下
